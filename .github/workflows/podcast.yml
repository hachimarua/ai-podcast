name: Generate Daily AI Podcast

on:
  schedule:
    # 毎朝 日本時間 6:00 (UTC 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch: # 手動実行用のボタンをGitHub上に配置

permissions:
  contents: write # リポジトリへのコミット＆プッシュ権限を許可

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # すべての履歴を取得

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Podcast Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        BASE_URL: "https://hachimarua.github.io/ai-podcast"
      run: |
        python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 生成されたpodcast.xmlと音声ファイル（episodes内）を追加
        git add podcast.xml episodes/
        
        # 変更がある場合のみコミット＆プッシュ
        if ! git diff --cached --quiet; then
          git commit -m "chore: Update daily podcast episode [skip ci]"
          git push
        else
          echo "No new podcast generated or files modified."
        fi
